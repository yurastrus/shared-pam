# app/pam/babel.cfg — PAM submodule string extraction.
# Run from the BIOMON REPO ROOT:
#   pybabel extract -F app/pam/babel.cfg -k _l -k lazy_gettext -D pam -o app/pam/messages.pot .
#
# Default `_` (gettext) is built-in to pybabel.

[python: app/pam/**.py]

[jinja2: app/pam/templates/**.html]
extensions = jinja2.ext.i18n,jinja2.ext.do
